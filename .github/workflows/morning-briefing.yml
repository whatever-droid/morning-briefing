name: morning-briefing

on:
  schedule:
    # GitHub Actions cron은 UTC 기준. 09:40 KST = 00:40 UTC.
    - cron: "40 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Build lesson page
        run: python send_briefing.py build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_REPO: ${{ github.repository }}
          BRIEFING_MODEL: claude-sonnet-4-6

      - name: Publish page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "lesson $(date -u +%F)" || echo "no change"
          git push

      - name: Send KakaoTalk
        run: python send_briefing.py send
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          GH_REPO: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
